global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'timesheet-devops-monitor'

# Configuration des alertes (optionnel)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Fichiers de règles d'alerte
rule_files:
  # - "alert.yml"

scrape_configs:
  # ============ Prometheus Self Monitoring ============
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus'

  # ============ Spring Boot Application Metrics ============
  - job_name: 'timesheet-devops'
    metrics_path: '/timesheet-devops/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8082']
        labels:
          service: 'timesheet-devops'
          environment: 'production'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spring-app'
    scrape_interval: 15s
    scrape_timeout: 5s

  # ============ Node Exporter (Ubuntu System Metrics) ============
  - job_name: 'ubuntu-node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'ubuntu-server'
          service: 'system-metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ubuntu'

  # ============ Docker Exporter (Docker Container Metrics) ============
  - job_name: 'docker-exporter'
    static_configs:
      - targets: ['docker-exporter:9323']
        labels:
          service: 'docker-metrics'
          exporter: 'docker'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker'
    scrape_interval: 15s
    scrape_timeout: 5s

  # ============ Portainer (Docker Management UI) ============
  - job_name: 'portainer'
    static_configs:
      - targets: ['portainer:9000']
        labels:
          service: 'portainer'
          application: 'docker-ui'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'portainer'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ============ Docker/cAdvisor Metrics (DISABLED - Replaced with Docker Exporter) ============
  # cAdvisor had compatibility issues with Docker Compose 1.29.2
  # Replaced with: Docker Exporter (9323) + Portainer (9000)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         service: 'docker-metrics'
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: 'docker'
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'jenkins'
          environment: 'ci-cd'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'jenkins'
    scrape_interval: 30s
    scrape_timeout: 10s
